name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

  security:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --error --exclude='**/node_modules/**' --exclude='**/dist/**' --exclude='**/*.test.ts' --exclude='**/*.integration.test.ts'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            packages/*/coverage/
          retention-days: 7

  integration-test:
    name: Integration Tests (DynamoDB Local)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Repository integration tests spin up `amazon/dynamodb-local` via
      # Testcontainers. The ubuntu-latest runner has a Docker daemon
      # preinstalled, so no services/dind setup is required (unlike GitLab).
      # Each command is scoped so the agent package's real-AWS integration
      # tests (which self-gate on credentials) are NOT pulled in:
      #   - backend: test:integration runs only repositories/**.integration
      #   - agent:   test:ddb runs only the DynamoDB-Local repository tests
      #              (test:integration there is the separate real-AWS suite)
      - name: Run backend integration tests
        run: npm run test:integration -w @moca/backend

      - name: Run agent DynamoDB Local tests
        run: npm run test:ddb -w @moca/agent

  ash:
    name: Security Scan (ASH)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run ASH
        run: uvx 'git+https://github.com/awslabs/automated-security-helper.git@v3.1.5'

      # Diagnostic: on failure, dump the aggregated ASH report so we can see the
      # exact `file_path` each GHSA finding carries (what suppressions match on).
      - name: Debug ASH findings
        if: always()
        run: |
          python3 - <<'PYEOF' || true
          import json, glob
          for f in glob.glob('.ash/ash_output/**/*.json', recursive=True):
              try:
                  d = json.load(open(f))
              except Exception:
                  continue
              hits = []
              def walk(o):
                  if isinstance(o, dict):
                      rid = o.get('rule_id') or o.get('ruleId')
                      if rid and 'GHSA' in str(rid):
                          hits.append((rid, o.get('file_path'), o.get('file_name')))
                      for v in o.values():
                          walk(v)
                  elif isinstance(o, list):
                      for v in o:
                          walk(v)
              walk(d)
              if hits:
                  print('###', f)
                  for h in sorted(set(hits)):
                      print('   rule_id=%r file_path=%r file_name=%r' % h)
          PYEOF

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build
